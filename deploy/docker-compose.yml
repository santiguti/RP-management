name: rp-management

services:
  postgres:
    image: postgres:16-alpine
    container_name: rp_postgres
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      # Bound to loopback only: psql from the server itself works,
      # nothing on the LAN can reach Postgres directly.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Prod-only by default. In dev, run `go run ./cmd/api` natively so the
  # localhost-style DATABASE_URL points at the host Postgres. See deploy/README.md.
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rp_api
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - attachments:/app/data/attachments
    depends_on:
      postgres:
        condition: service_healthy

  # Prod-only by default (no live-reload). Dev uses `npm run dev` + Vite proxy.
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rp_web
    restart: unless-stopped
    depends_on:
      - api

  # Single entrypoint: serves the SPA and proxies /api/* to the Go API.
  # Port 80 is the only LAN-visible port — the shop can use http://<server-ip>
  # even if the internet (and therefore the tunnel) is down.
  caddy:
    image: caddy:2-alpine
    container_name: rp_caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - web

  # Outbound-only connection to Cloudflare's edge; no inbound ports at all.
  # TUNNEL_TOKEN comes from ../.env (see .env.example).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rp_cloudflared
    restart: unless-stopped
    env_file:
      - ../.env
    command: tunnel --no-autoupdate run
    depends_on:
      - caddy

volumes:
  pgdata:
    name: rp_pgdata
  attachments:
    name: rp_attachments
