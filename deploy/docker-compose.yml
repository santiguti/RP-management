name: rp-management

services:
  postgres:
    image: postgres:16-alpine
    container_name: rp_postgres
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Prod-only by default. In dev, run `go run ./cmd/api` natively so the
  # localhost-style DATABASE_URL points at the host Postgres. See deploy/README.md.
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rp_api
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Prod-only by default (no live-reload). Dev uses `npm run dev` + Vite proxy.
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rp_web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
    name: rp_pgdata
