name: ci

on:
  push:
    branches: [ master, main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dummytest
          POSTGRES_PASSWORD: dummy123
          POSTGRES_DB: dummydb
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U dummytest -d dummydb"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://dummytest:dummy123@localhost:5432/dummydb?sslmode=disable
      COOKIE_SECRET: ci-cookie-secret-not-used-anywhere-real
      APP_ENV: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25.x', cache-dependency-path: backend/go.sum }
      - name: Apply migrations
        working-directory: backend
        run: make migrate-up
      - name: Build
        working-directory: backend
        run: go build ./...
      - name: Test
        working-directory: backend
        run: go test ./... -count=1

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type-check + build
        working-directory: frontend
        run: |
          npx tsc -b --noEmit
          npm run build
